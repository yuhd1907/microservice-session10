services:
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka-pharmacy
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-topics-init:
    image: apache/kafka:4.1.2
    container_name: kafka-topics-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic medicine-stock-events --partitions 3 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic medicine-price-updates --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic pharmacy-notifications --partitions 2 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:29092

  postgres:
    image: postgres:16
    container_name: postgres-pharmacy
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy
      POSTGRES_PASSWORD: pharmacy123
    volumes:
      - pharmacy-pg-data:/var/lib/postgresql/data

volumes:
  pharmacy-pg-data:
